<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Produto - PDV MASTER</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/formularios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">PDV MASTER</div>
        <nav>
            <a href="index.html"><i class="fas fa-cash-register"></i> Caixa</a>
            <a href="produtos.html" class="active"><i class="fas fa-boxes"></i> Estoque</a>
            <a href="clientes.html"><i class="fas fa-users"></i> Clientes</a>
            <a href="relatorio.html"><i class="fas fa-chart-pie"></i> Financeiro</a>
            <a href="categorias.html"><i class="fas fa-tags"></i> Categorias</a>
        </nav>
    </aside>

    <main>
        <div class="container-small">
            <header class="header-top">
                <div>
                    <h1><i class="fas fa-plus-circle"></i> Novo Produto</h1>
                    <p style="color: #64748b; font-size: 0.9rem;">Preencha os campos para cadastrar o item no estoque.</p>
                </div>
                <a href="produtos.html" class="btn-secondary">
                    <i class="fas fa-arrow-left"></i> Voltar
                </a>
            </header>

            <div class="card">
                <form id="form-cadastrar-produto">
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Nome do Item</label>
                        <input type="text" id="nome" required placeholder="Ex: Panela de Pressão">
                    </div>
                    
                    <div class="grid-2">
                        <div class="form-group">
                            <label><i class="fas fa-hand-holding-usd"></i> Preço Venda</label>
                            <input type="number" id="preco" step="0.01" required placeholder="0,00">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-comment-dollar"></i> Preço Custo</label>
                            <input type="number" id="custo" step="0.01" required placeholder="0,00">
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label><i class="fas fa-layer-group"></i> Categoria</label>
                            <select id="categoria" required>
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-cubes"></i> Quantidade</label>
                            <input type="number" id="quantidade" required placeholder="0">
                        </div>
                    </div>

                    <div class="form-actions" style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">
                            <i class="fas fa-save"></i> Salvar no Sistema
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="js/scriptCadastrar.js"></script>
</body>
</html>
