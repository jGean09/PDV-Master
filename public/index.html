<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PDV MASTER - Caixa</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/vendas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">PDV MASTER</div>
        <nav>
            <a href="index.html" class="active"><i class="fas fa-cash-register"></i> Caixa</a>
            <a href="produtos.html"><i class="fas fa-boxes"></i> Estoque</a>
            <a href="clientes.html"><i class="fas fa-users"></i> Clientes</a>
            <a href="relatorio.html"><i class="fas fa-chart-pie"></i> Financeiro</a>
            <a href="categorias.html"><i class="fas fa-tags"></i> Categorias</a>
        </nav>
    </aside>

    <main>
        <header class="pos-header">
            <h1>Frente de Caixa</h1>
            <input type="text" id="busca" placeholder="🔍 Buscar produto...">
        </header>

        <div class="pos-container">
            <div class="products-grid" id="grid-produtos"></div>

            <div class="cart-panel">
                <h3><i class="fas fa-shopping-basket"></i> Itens da Venda</h3>
                <div class="cart-items" id="resumo-venda"></div>

                <div class="total-section">
                    <label>Cliente</label>
                    <select id="cliente-selecionado">
                        <option value="">Consumidor Final</option>
                    </select>
                    <span>Total a Pagar</span>
                    <h2 id="total">R$ 0,00</h2>
                    <button id="finalizar" class="btn-finish">FINALIZAR VENDA (F8)</button>
                </div>
            </div>
        </div>
    </main>
    <script src="js/scriptVenda.js"></script>
</body>
</html>
