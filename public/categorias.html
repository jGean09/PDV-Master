<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias - PDV MASTER</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/formularios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">PDV MASTER</div>
        <nav>
            <a href="index.html"><i class="fas fa-cash-register"></i> Caixa</a>
            <a href="produtos.html"><i class="fas fa-boxes"></i> Estoque</a>
            <a href="clientes.html"><i class="fas fa-users"></i> Clientes</a>
            <a href="relatorio.html"><i class="fas fa-chart-pie"></i> Financeiro</a>
            <a href="categorias.html" class="active"><i class="fas fa-tags"></i> Categorias</a>
        </nav>
    </aside>

    <main>
        <header style="margin-bottom: 2rem;">
            <h1>Gerenciamento de Categorias</h1>
            <p style="color: #64748b;">Organize seus produtos por grupos para facilitar as vendas.</p>
        </header>
        
        <div class="grid-2">
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> Nova Categoria</h3>
                <form id="form-cadastrar-categoria">
                    <div class="form-group">
                        <label>Nome da Categoria</label>
                        <input type="text" id="nome-categoria" required placeholder="Ex: Bebidas, Alimentos...">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">
                        Salvar Categoria
                    </button>
                </form>
            </div>

            <div class="card">
                <h3><i class="fas fa-list"></i> Categorias Cadastradas</h3>
                <ul id="lista-categorias" class="list-clean">
                    </ul>
            </div>
        </div>
    </main>

    <script src="js/scriptCategorias.js"></script>
</body>
</html>
